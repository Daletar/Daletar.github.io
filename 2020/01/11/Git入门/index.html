        <h1 id="GIT使用"><a href="#GIT使用" class="headerlink" title="GIT使用"></a>GIT使用</h1><p>参考：<br><br><a href="http://www.jianshu.com/p/5be78fd1b0cb" target="_blank" rel="noopener">http://www.jianshu.com/p/5be78fd1b0cb</a></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line">1、查看git提交日志</span><br><span class="line">git log --pretty&#x3D;oneline</span><br><span class="line">git log --pretty&#x3D;format:&quot;%h - %an, %ar : %s&quot;</span><br><span class="line"></span><br><span class="line">2、导出git日志csv、excel文件</span><br><span class="line">进入项目根目录</span><br><span class="line">git log --date&#x3D;iso --pretty&#x3D;format:&#39;&quot;%h&quot;,&quot;%an&quot;,&quot;%ad&quot;,&quot;%s&quot;&#39; &gt;log.csv</span><br><span class="line"></span><br><span class="line">3、查看页面详细修改记录，并重定向到123文档</span><br><span class="line">git blame ViewController &gt; 123.txt</span><br><span class="line"></span><br><span class="line">git checkout . #本地所有修改的。没有的提交的，都返回到原来的状态</span><br><span class="line">git stash #把所有没有提交的修改暂存到stash里面。可用git stash pop回复。 </span><br><span class="line">git reset --hard HASH #返回到某个节点，不保留修改。</span><br><span class="line">git reset --soft HASH #返回到某个节点。保留修改</span><br><span class="line">git clean -df #返回到某个节点 </span><br><span class="line">git clean 参数 -n 显示 将要 删除的 文件 和 目录 -f 删除 文件 -df 删除 文件 和 目录</span><br></pre></td></tr></table></figure>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line">1.克隆(clone)：从远程仓库URL加载创建一个与远程仓库一样的本地仓库</span><br><span class="line">2.提交(commit)：将暂存文件上传到本地仓库（我们在Finder中对本地仓库做修改后一般都得先提交一次，再推送）</span><br><span class="line">3.检出(checkout)：切换不同分支</span><br><span class="line">4.添加（add）：添加文件到缓存区</span><br><span class="line">5.移除（remove）：移除文件至缓存区</span><br><span class="line">6.暂存(git stash)：保存工作现场</span><br><span class="line">7.重置(reset)：回到最近添加(add)&#x2F;提交(commit)状态</span><br><span class="line">8.合并(merge)：将多个同名文件合并为一个文件，该文件包含多个同名文件的所有内容，相同内容抵消</span><br><span class="line">9.抓取(fetch)：从远程仓库获取信息并同步至本地仓库</span><br><span class="line">10.拉取(pull)：从远程仓库获取信息并同步至本地仓库，并且自动执行合并（merge）操作，即 ** pull&#x3D;fetch+merge **</span><br><span class="line">11.推送(push)：将本地仓库同步至远程仓库，一般推送（push）前先拉取（pull）一次，确保一致</span><br><span class="line">12.分支(branch)：创建&#x2F;修改&#x2F;删除分枝</span><br><span class="line">13.标签(tag):给项目增添标签</span><br><span class="line">14.工作流(Git Flow):团队工作时，每个人创建属于自己的分枝（branch），确定无误后提交到master分枝</span><br><span class="line">15.终端(terminal):可以输入git命令行</span><br></pre></td></tr></table></figure>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br></pre></td><td class="code"><pre><span class="line">二、命令行</span><br><span class="line">git help         帮助命令</span><br><span class="line">git -init         创建一个仓库          </span><br><span class="line">git add .       提交到暂缓区           </span><br><span class="line">git status     查看文件状态（如果看到文件颜色是绿色，表示可以提交）          </span><br><span class="line">git commit   会进入vim里面输入注视 </span><br><span class="line">git commit -m</span><br><span class="line">git push origin ipa_feature_checkin    推送到远程分支</span><br><span class="line">git log    查看项目日志  </span><br><span class="line">git log --pretty&#x3D;oneline     切换日志格式</span><br><span class="line">git reflog        命令使用记录 </span><br><span class="line">cat .git&#x2F;config    查看配置:</span><br><span class="line">git rm + 文件名     删除项目中的文件 </span><br><span class="line">git fetch   获取远端分支</span><br><span class="line">git branch     查看分支</span><br><span class="line">git checkout develop     切换到develop分支</span><br><span class="line">git branch ipa_feature_checkin         创建ipa_feature_checkin分支</span><br><span class="line">git branch -d ipa_feature_checkin         删除ipa_feature_checkin分支</span><br><span class="line"></span><br><span class="line">git remote add original https:&#x2F;&#x2F;gitee.com&#x2F;ta113332007&#x2F;React.git</span><br><span class="line">git push origin master</span><br><span class="line">git config --list  查看配置信息</span><br><span class="line"></span><br><span class="line">1.切换到develop分支     git checkout develop    </span><br><span class="line">2.合并分支代码   git merge ipa_feature_checkin</span><br><span class="line">3.更新远程develop代码     git push origin master</span><br><span class="line"></span><br><span class="line">git reset --hard HEAD^ 回到当前版本</span><br><span class="line">git reset --hard HEAD^ + 版本号</span><br><span class="line"></span><br><span class="line">配置全局账号：默认一个git仓库 没有配置用户名和邮箱就使用全局</span><br><span class="line">git config --global user.email “13912345678@139.com&quot;</span><br><span class="line">git config --global user.name “huangyang”</span><br><span class="line"></span><br><span class="line">局部：针对本项目才有效</span><br><span class="line">git config &quot;user.name&quot; zhangsan</span><br><span class="line">git config &quot;user.email&quot; 13912345678@139.com</span><br></pre></td></tr></table></figure>
